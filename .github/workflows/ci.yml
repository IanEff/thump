name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: fmt-check
        run: make fmt-check

      - name: vet
        run: make vet

      - name: lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: vulncheck
        run: make vulncheck

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Chart lint (kubeconform)
        run: make chart-lint

      - name: test
        run: make test

      - name: build
        run: make build

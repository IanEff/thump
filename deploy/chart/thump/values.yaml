# replicas is 0/1 ONLY. The beats hold in-memory state (clank's ledger+casebase
# that the Learn edge shares, hiss/thump/rattle dedup logs). A 2nd replica makes
# JetStream load-balance the durable consumer across pods, each with its own empty
# ledger → outcomes land on the pod that never opened their set → learning dies
# silently (the A3 trap at cluster scale). Horizontal scale needs the state OUT of
# process first — a much later phase. Do not raise this to scale; it will break the
# loop, not speed it up.
replicas: 0

image:
  registry: ghcr.io/ianeff
  # tag is deliberately blank: the git SHA is stamped at deploy time
  # (`make images` / CI), never defaulted to `latest` — see
  # image-tagging-immutability. `helm template/install --set image.tag=<sha>`.
  tag: ""
  pullPolicy: IfNotPresent

# Switches whir and rattle profiles by cluster, while they're still hardwired
configProfile: ceph-lab

# VERIFY against the lab: `kubectl -n monitoring get svc` before committing.
prometheus:
  url: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090

# gateway.enabled is false in the cluster's loki kustomization (singleBinary
# mode) — clients hit the loki service directly, not a loki-gateway. VERIFY
# against the lab: `kubectl -n logging get svc` before committing.
loki:
  url: http://loki.logging.svc.cluster.local:3100

# Empty by default — internal/beat.Tracer treats an empty
# OTEL_EXPORTER_OTLP_ENDPOINT as "unconfigured" and falls back to a noop
# Tracer, so a cluster with no OTel collector/Tempo deployed still starts
# clean. Set per-cluster (bare host:port, no scheme — otlptracegrpc.
# WithEndpoint's convention, unlike prometheus.url/loki.url above) once
# Tempo is actually reachable there. VERIFY against the lab like
# prometheus.url/loki.url.
tracing:
  endpoint: ""

# The key rides a Secret created out-of-band via the lab's existing
# SOPS-encrypted-secret flow — this chart only references it by name/key,
# it never contains or generates the plaintext key. `create: true` +
# `apiKey` is a local/Tilt-dev escape hatch ONLY — never set apiKey in a
# committed values file.
anthropic:
  secretName: thump-anthropic
  secretKey: api-key
  create: false
  apiKey: ""

# S3-compatible object store — every beat's broker path Require()s all four
# S3_* vars once NATS_URL is set (internal/config/config.go): the WAL
# shipper (every beat) and clank's S3Store transcript checkpoints. Same
# out-of-band posture as anthropic above: production expects secretName to
# already exist; create/the four value fields are a --set-only escape
# hatch, never a committed values file.
s3:
  secretName: thump-s3
  create: false
  endpoint: ""
  bucket: ""
  accessKey: ""
  secretKey: ""

# Per-beat resources (W0-2: one umbrella chart, per-beat values sections).
# Stage 0 confirmed real headroom; every beat starts small — the whole
# machine should cost less than one CSI sidecar.
beats:
  rattle:
    resources:
      requests: {cpu: 25m, memory: 32Mi}
      limits: {cpu: 100m, memory: 64Mi}
  clank:
    resources:
      requests: {cpu: 25m, memory: 32Mi}
      limits: {cpu: 100m, memory: 128Mi}
  hiss:
    resources:
      requests: {cpu: 25m, memory: 32Mi}
      limits: {cpu: 100m, memory: 64Mi}
  thump:
    resources:
      requests: {cpu: 25m, memory: 32Mi}
      limits: {cpu: 100m, memory: 64Mi}

# NATS jetstream message broker
nats:
  image:
    tag: "2.14.2-alpine"
  storageClass: "standard"
  storage: 2Gi
  jetstream:
    maxMemory: 256Mi
    maxFile: 2Gi
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 250m
      memory: 256Mi
  # The rest of this targets the control plane node for my noisy test cluster
  nodeSelector:
    node-role.kubernetes.io/control-plane: "true"
  tolerations:
    - key: "node-role.kubernetes.io/control-plane"
      operator: "Exists"
      effect: "NoSchedule"
    - key: "node-role.kubernetes.io/master"
      operator: "Exists"
      effect: "NoSchedule"
# Per-beat /healthz and /readyz
metrics:
  port: 9090

# Each beat gets a service-<beat>.yaml Service exposing the metrics port
# unconditionally (cheap, no CRD dependency) — the ServiceMonitor on top of
# them is opt-in because the monitoring.coreos.com CRDs aren't guaranteed
# to exist on every cluster this chart targets; enabling it against a
# cluster without the Prometheus Operator installed fails at apply time,
# not at template time.
serviceMonitor:
  enabled: false
  interval: 30s
  # kube-prometheus-stack's Prometheus CR usually only picks up
  # ServiceMonitors matching its own serviceMonitorSelector (often a
  # release label) — set here per-cluster if the lab's Prometheus
  # requires one. VERIFY against the lab like prometheus.url/loki.url
  # above.
  additionalLabels: {}

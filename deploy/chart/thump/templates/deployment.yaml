# W0-1: one Deployment, four containers, one shared emptyDir — the pod IS
# the WS3 motivation made visible (the broker is what earns separate
# Deployments later). Dir-chaining works exactly as it does on a Mac, just
# rooted at /var/thump instead of /tmp/thump.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thump
  namespace: thump
  labels:
    {{- include "thump.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "thump.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "thump.selectorLabels" . | nindent 8 }}
      annotations:
        # W0-3: a config change rolls the pod. The beats are restart-tolerant
        # by design (Debouncer/Ledger are in-memory, proven in the
        # 2026-07-04 live run) and every loader reads its file once at
        # startup — so a restart is the whole reload story, zero code
        # changes needed.
        checksum/config: {{ include (print $.Template.BasePath "/configmap-whir.yaml") . | sha256sum }}-{{ include (print $.Template.BasePath "/configmap-rattle.yaml") . | sha256sum }}-{{ include (print $.Template.BasePath "/configmap-hiss.yaml") . | sha256sum }}
    spec:
      volumes:
        - name: shared
          emptyDir: {}
        - name: whir-config
          configMap:
            name: thump-whir
        - name: rattle-config
          configMap:
            name: thump-rattle
        - name: hiss-config
          configMap:
            name: thump-hiss
      containers:
        # --- rattle: Detect. Watches Prometheus, writes SignalDetections. ---
        - name: rattle
          image: "{{ .Values.image.registry }}/thump-rattle:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: PROM_URL
              value: {{ .Values.prometheus.url | quote }}
            - name: WHIR_CATALOG
              value: /etc/thump/whir/catalog-info.yaml
            - name: WHIR_STATE_QUERIES
              value: /etc/thump/whir/state-queries.yaml
            - name: RATTLE_TRAFFIC
              value: /etc/thump/rattle/traffic-queries.yaml
            - name: RATTLE_OUTBOX
              value: /var/thump/detections
          volumeMounts:
            - {name: shared, mountPath: /var/thump}
            - {name: whir-config, mountPath: /etc/thump/whir}
            - {name: rattle-config, mountPath: /etc/thump/rattle}
          resources:
            {{- toYaml .Values.beats.rattle.resources | nindent 12 }}

        # --- clank: Reason. Reads detections, calls the model, writes
        # ProposalSets; also reads thump's outcomes back (the Learn edge). ---
        - name: clank
          image: "{{ .Values.image.registry }}/thump-clank:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: CLANK_INBOX
              value: /var/thump/detections
            - name: CLANK_OUTBOX
              value: /var/thump/proposals
            - name: CLANK_OUTCOMES
              value: /var/thump/outcomes
            - name: CLANK_TRANSCRIPTS
              value: /var/thump/transcripts
            - name: WHIR_CATALOG
              value: /etc/thump/whir/catalog-info.yaml
            - name: WHIR_STATE_QUERIES
              value: /etc/thump/whir/state-queries.yaml
            - name: PROM_URL
              value: {{ .Values.prometheus.url | quote }}
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.anthropic.secretName }}
                  key: {{ .Values.anthropic.secretKey }}
          volumeMounts:
            - {name: shared, mountPath: /var/thump}
            - {name: whir-config, mountPath: /etc/thump/whir}
          resources:
            {{- toYaml .Values.beats.clank.resources | nindent 12 }}

        # --- hiss: Govern. Reads ProposalSets, writes Decisions. ---
        - name: hiss
          image: "{{ .Values.image.registry }}/thump-hiss:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: HISS_INBOX
              value: /var/thump/proposals
            - name: HISS_OUTBOX
              value: /var/thump/decisions
            - name: HISS_POLICY
              value: /etc/thump/hiss/policy.yaml
          volumeMounts:
            - {name: shared, mountPath: /var/thump}
            - {name: hiss-config, mountPath: /etc/thump/hiss}
          resources:
            {{- toYaml .Values.beats.hiss.resources | nindent 12 }}

        # --- thump: Act (dry-run only, I-12). Reads Decisions, writes
        # Outcomes back to clank's Learn edge. ---
        - name: thump
          image: "{{ .Values.image.registry }}/thump-thump:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: THUMP_INBOX
              value: /var/thump/decisions
            - name: THUMP_OUTBOX
              value: /var/thump/outcomes
          volumeMounts:
            - {name: shared, mountPath: /var/thump}
          resources:
            {{- toYaml .Values.beats.thump.resources | nindent 12 }}

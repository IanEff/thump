{{- if .Values.cilium.apiserverEgress }}
# Cilium-only companion to netpol-clank.yaml. The kube-apiserver carries a
# reserved Cilium identity ("kube-apiserver") that a standard NetworkPolicy
# ipBlock/CIDR egress rule does not match — so clank's read-only pod-listing
# evidence tool, which reaches the apiserver over client-go, gets an i/o
# timeout under the plain NetworkPolicy alone (its 0.0.0.0/0:443 rule looks
# like it should reach kubernetes.default.svc, but can't on Cilium). Cilium
# unions allow-rules across policies, so this adds apiserver egress on top of
# clank-egress rather than replacing it. Gated because non-Cilium profiles
# don't have this CRD. Same shape as ciliumnetpol-thump.yaml — different
# component, same reserved-identity problem.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: clank-apiserver-egress
  namespace: thump
  labels: {{- include "thump.labels" . | nindent 4 }}
spec:
  endpointSelector:
    matchLabels: {{- include "thump.beatSelectorLabels" (merge (dict "component" "clank") .) | nindent 6 }}
  egress:
    - toEntities:
        - kube-apiserver
{{- end }}

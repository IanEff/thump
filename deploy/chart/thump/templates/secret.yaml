{{/*
Off by default: production expects `anthropic.secretName` to already exist
in-namespace (the lab's SOPS flow owns it). This template only fires when
you opt in with `--set anthropic.create=true --set anthropic.apiKey=...`,
e.g. a local Tilt values override — never from a committed values file.
*/}}
{{- if .Values.anthropic.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.anthropic.secretName }}
  namespace: thump
  labels:
    {{- include "thump.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.anthropic.secretKey }}: {{ .Values.anthropic.apiKey | quote }}
{{- end }}

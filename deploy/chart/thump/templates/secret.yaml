{{/*
Off by default: production expects `anthropic.secretName` to already exist
in-namespace (the lab's SOPS flow owns it). This template only fires when
you opt in with `--set anthropic.create=true --set anthropic.apiKey=...`,
e.g. a local Tilt values override — never from a committed values file.
*/}}
{{- if .Values.anthropic.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.anthropic.secretName }}
  namespace: thump
  labels:
    {{- include "thump.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.anthropic.secretKey }}: {{ .Values.anthropic.apiKey | quote }}
{{- end }}

{{/*
Same off-by-default posture as the anthropic Secret above: production
expects `s3.secretName` to already exist out-of-band. Only fires with
`--set s3.create=true` — e.g. a local Tilt values override.
*/}}
{{- if .Values.s3.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.s3.secretName }}
  namespace: thump
  labels:
    {{- include "thump.labels" . | nindent 4 }}
type: Opaque
stringData:
  endpoint: {{ .Values.s3.endpoint | quote }}
  bucket: {{ .Values.s3.bucket | quote }}
  access-key: {{ .Values.s3.accessKey | quote }}
  secret-key: {{ .Values.s3.secretKey | quote }}
{{- end }}

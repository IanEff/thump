apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: thump-egress
  namespace: thump
  labels: {{- include "thump.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "thump.beatSelectorLabels" (merge (dict "component" "thump") .) | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: thump
              app.kubernetes.io/component: nats
      ports:
        - protocol: TCP
          port: 4222
    # The automatic-reversal Converger reads Prometheus (internal/converge)
    # to ask "did the action work?" — same monitoring:9090 egress clank uses
    # for its evidence tool.
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tracing
      ports:
        - protocol: TCP
          port: 4317
    # A plain NetworkPolicy has no hostname-match primitive (that's Cilium's
    # toFQDNs, which this chart deliberately doesn't require) — this widens
    # the intended "storage.googleapis.com only" pin (WAL shipping via
    # internal/publish, wired through internal/beat) to any HTTPS destination.
    # NOTE: this does NOT reach the in-cluster kube-apiserver on Cilium — the
    # apiserver has a reserved Cilium identity that an ipBlock/CIDR rule can't
    # match. The live executor's apiserver access (pod-list, pods/exec, the
    # CephObjectStore patch) comes from ciliumnetpol-thump.yaml instead.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

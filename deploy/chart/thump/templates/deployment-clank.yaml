apiVersion: apps/v1
kind: Deployment
metadata:
  name: clank
  namespace: thump
  labels: {{- include "thump.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels: {{- include "thump.beatSelectorLabels" (merge (dict "component" "clank") .) | nindent 6 }}
  template:
    metadata:
      labels: {{- include "thump.beatSelectorLabels" (merge (dict "component" "clank") .) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-whir.yaml") . | sha256sum }}
    spec:
      containers:
        - name: clank
          image: "{{ .Values.image.registry }}/thump-clank:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: NATS_URL
              value: "nats://nats.thump.svc:4222"
            - name: WAL_DIR
              value: /var/thump/wal
            - name: PROM_URL
              value: {{ .Values.prometheus.url | quote }}
            - name: WHIR_CATALOG
              value: /etc/thump/whir/catalog-info.yaml
            - name: WHIR_STATE_QUERIES
              value: /etc/thump/whir/state-queries.yaml
            - name: EVIDENCE_QUERIES
              value: /etc/thump/whir/evidence-queries.yaml
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.anthropic.secretName }}
                  key: {{ .Values.anthropic.secretKey }}
          volumeMounts:
            - name: wal
              mountPath: /var/thump/wal
            - name: whir-config
              mountPath: /etc/thump/whir
          resources: {{- toYaml .Values.beats.clank.resources | nindent 12 }}
      volumes:
        - name: wal
          emptyDir: {}
        - name: whir-config
          configMap:
            name: thump-whir

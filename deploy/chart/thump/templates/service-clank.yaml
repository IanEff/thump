apiVersion: v1
kind: Service
metadata:
  name: clank-metrics
  namespace: thump
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "{{ .Values.metrics.port }}"
    prometheus.io/path: "/metrics"
  labels: {{- include "thump.labels" . | nindent 4 }}
    app.kubernetes.io/component: clank
spec:
  selector: {{- include "thump.beatSelectorLabels" (merge (dict "component" "clank") .) | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics

apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clank-egress
  namespace: thump
  labels: {{- include "thump.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "thump.beatSelectorLabels" (merge (dict "component" "clank") .) | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: thump
              app.kubernetes.io/component: nats
      ports:
        - protocol: TCP
          port: 4222
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logging
      ports:
        - protocol: TCP
          port: 3100
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: tracing
      ports:
        - protocol: TCP
          port: 4317
    # A plain NetworkPolicy has no hostname-match primitive (that's Cilium's
    # toFQDNs, which this chart deliberately doesn't require) — this widens
    # the intended "api.anthropic.com only" pin to any HTTPS destination.
    # NOTE: this does NOT reach the in-cluster kube-apiserver on Cilium — the
    # apiserver has a reserved Cilium identity that an ipBlock/CIDR rule can't
    # match, even though kubernetes.default.svc is also port 443. clank's
    # read-only pod-listing evidence tool reaches the apiserver via
    # ciliumnetpol-clank.yaml instead (gated on cilium.apiserverEgress).
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

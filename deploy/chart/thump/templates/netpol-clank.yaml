apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: clank-egress
  namespace: thump
  labels: {{- include "thump.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "thump.beatSelectorLabels" (merge (dict "component" "clank") .) | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: thump
              app.kubernetes.io/component: nats
      ports:
        - protocol: TCP
          port: 4222
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: logging
      ports:
        - protocol: TCP
          port: 3100
    # A plain NetworkPolicy has no hostname-match primitive (that's Cilium's
    # toFQDNs, which this chart deliberately doesn't require) — this widens
    # the intended "api.anthropic.com only" pin to any HTTPS destination.
    # It also happens to be how clank reaches kube-apiserver: the in-cluster
    # kubernetes.default.svc ClusterIP is port 443 too, so this one rule
    # covers both needs without a separate apiserver carve-out.
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
      ports:
        - protocol: TCP
          port: 443

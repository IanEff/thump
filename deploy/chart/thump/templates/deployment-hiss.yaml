apiVersion: apps/v1
kind: Deployment
metadata:
  name: hiss
  namespace: thump
  labels: {{- include "thump.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels: {{- include "thump.beatSelectorLabels" (merge (dict "component" "hiss") .) | nindent 6 }}
  template:
    metadata:
      labels: {{- include "thump.beatSelectorLabels" (merge (dict "component" "hiss") .) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-hiss.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: hiss
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          image: "{{ .Values.image.registry }}/thump-hiss:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: METRICS_ADDR
              value: ":{{ .Values.metrics.port }}"
            - name: NATS_URL
              value: "nats://nats.thump.svc:4222"
            - name: WAL_DIR
              value: /var/thump/wal
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: endpoint
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: bucket
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: secret-key
            - name: HISS_POLICY
              value: /etc/thump/hiss/policy.yaml
          volumeMounts:
            - name: wal
              mountPath: /var/thump/wal
            - name: hiss-config
              mountPath: /etc/thump/hiss
          resources: {{- toYaml .Values.beats.hiss.resources | nindent 12 }}
      volumes:
        - name: wal
          emptyDir: {}
        - name: hiss-config
          configMap:
            name: thump-hiss

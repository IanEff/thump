apiVersion: v1
kind: ConfigMap
metadata:
  name: thump-nats
  namespace: thump
  labels: {{- include "thump.labels" . | nindent 4 }}
data:
  nats.conf: |
    # single-node lab broker. No auth: it's only reachable inside ns/thump on
    # the pod network. Monitoring on :8222 for /healthz + port-forward.
    port: 4222
    http: 8222
    jetstream {
      store_dir: /data
      # unquoted: NATS's own config lexer parses the Mi/Gi suffix here, but
      # only outside a quoted string — quoted, it strconv.ParseInt's the raw
      # text and chokes on the trailing unit (verified against a real
      # nats-server -t).
      max_memory_store: {{ .Values.nats.jetstream.maxMemory }}
      max_file_store:   {{ .Values.nats.jetstream.maxFile }}
    }
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: thump
  labels: {{- include "thump.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: thump
    app.kubernetes.io/component: nats
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: thump
  labels: {{- include "thump.labels" . | nindent 4 }}
spec:
  replicas: 1
  serviceName: nats
  selector:
    matchLabels:
      app.kubernetes.io/name: thump
      app.kubernetes.io/component: nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: thump
        app.kubernetes.io/component: nats
    spec:
      # THE PIN: Inject the nodeSelector and tolerations from values.yaml
      nodeSelector: {{- toYaml .Values.nats.nodeSelector | nindent 8 }}
      tolerations: {{- toYaml .Values.nats.tolerations | nindent 8 }}

      containers:
        - name: nats
          image: "nats:{{ .Values.nats.image.tag }}"
          args: ["-c", "/etc/nats/nats.conf"]
          ports:
            - { containerPort: 4222, name: client }
            - { containerPort: 8222, name: monitor }
          volumeMounts:
            - { name: config, mountPath: /etc/nats }
            - { name: data, mountPath: /data }
          readinessProbe:
            httpGet: { path: /healthz, port: 8222 }
            initialDelaySeconds: 2
          resources: {{- toYaml .Values.nats.resources | nindent 12 }}
      volumes:
        - name: config
          configMap: { name: thump-nats }

  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        # The local-path storage class handles carving out the host path
        storageClassName: {{ .Values.nats.storageClass | quote }}
        resources: { requests: { storage: {{ .Values.nats.storage | quote }} } }

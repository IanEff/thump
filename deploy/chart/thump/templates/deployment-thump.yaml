apiVersion: apps/v1
kind: Deployment
metadata:
  name: thump
  namespace: thump
  labels: {{- include "thump.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels: {{- include "thump.beatSelectorLabels" (merge (dict "component" "thump") .) | nindent 6 }}
  template:
    metadata:
      labels: {{- include "thump.beatSelectorLabels" (merge (dict "component" "thump") .) | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap-actions.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: thump
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          image: "{{ .Values.image.registry }}/thump-thump:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: METRICS_ADDR
              value: ":{{ .Values.metrics.port }}"
            - name: NATS_URL
              value: "nats://nats.thump.svc:4222"
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.tracing.endpoint | quote }}
            - name: WAL_DIR
              value: /var/thump/wal
            - name: S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: endpoint
            - name: S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: bucket
            - name: S3_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: access-key
            - name: S3_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.s3.secretName }}
                  key: secret-key
            - name: ACTION_CATALOG
              value: /etc/thump/actions/catalog.yaml
            - name: THUMP_EXECUTOR
              value: {{ .Values.thump.executor | quote }}
            - name: THUMP_KILLSWITCH
              value: /etc/thump/killswitch/switch.yaml
            - name: PROM_URL
              value: {{ .Values.prometheus.url | quote }}
            - name: EVIDENCE_QUERIES
              value: /etc/thump/whir/evidence-queries.yaml
          volumeMounts:
            - name: wal
              mountPath: /var/thump/wal
            - name: actions-config
              mountPath: /etc/thump/actions
            - name: killswitch
              mountPath: /etc/thump/killswitch
            - name: whir-config
              mountPath: /etc/thump/whir
          resources: {{- toYaml .Values.beats.thump.resources | nindent 12 }}
      volumes:
        - name: wal
          emptyDir: {}
        - name: actions-config
          configMap:
            name: thump-actions
        - name: killswitch
          configMap:
            name: thump-killswitch
        - name: whir-config
          configMap:
            name: thump-whir

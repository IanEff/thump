# Scope matches exactly the otel-demo-domain bindings in
# internal/actuate/runner.go (flagd() and restart-cart-pod) — nothing
# broader. Read-only pod/deployment access for clank's investigation loop
# lives in the paired rbac-otel-demo-read.yaml, not here.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: thump-otel-demo-actuate
  namespace: otel-demo
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "patch"]
    resourceNames: ["flagd-config"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["patch"]
    resourceNames: ["cart"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: thump-otel-demo-actuate
  namespace: otel-demo
subjects:
  - kind: ServiceAccount
    name: default
    namespace: thump
roleRef:
  kind: Role
  name: thump-otel-demo-actuate
  apiGroup: rbac.authorization.k8s.io

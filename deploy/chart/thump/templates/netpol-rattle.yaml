apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: rattle-egress
  namespace: thump
  labels: {{- include "thump.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels: {{- include "thump.beatSelectorLabels" (merge (dict "component" "rattle") .) | nindent 6 }}
  policyTypes:
    - Egress
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - protocol: UDP
          port: 53
        - protocol: TCP
          port: 53
    - to:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: thump
              app.kubernetes.io/component: nats
      ports:
        - protocol: TCP
          port: 4222
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: monitoring
      ports:
        - protocol: TCP
          port: 9090

# See configmap-whir.yaml for the .Files.Get / symlink note — same pattern.
apiVersion: v1
kind: ConfigMap
metadata:
  name: thump-rattle
  namespace: thump
  labels:
    {{- include "thump.labels" . | nindent 4 }}
data:
  traffic-queries.yaml: |
{{ .Files.Get (printf "config/%s/rattle/traffic-queries.yaml" .Values.configProfile) | indent 4 }}
  watch.yaml: |
{{ .Files.Get (printf "config/%s/rattle/watch.yaml" .Values.configProfile) | indent 4 }}

apiVersion: v1
kind: Service
metadata:
  name: thump-metrics
  namespace: thump
  labels: {{- include "thump.labels" . | nindent 4 }}
    app.kubernetes.io/component: thump
spec:
  selector: {{- include "thump.beatSelectorLabels" (merge (dict "component" "thump") .) | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metrics.port }}
      targetPort: metrics

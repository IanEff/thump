version: '3.8'

services:
  clank:
    build:
      context: .
      target: clank
    ports:
      - "8080:8080"
    environment:
      - ENVIRONMENT=development
      # Add other clank-specific env vars here
    restart: unless-stopped

  rattle:
    build:
      context: .
      target: rattle
    ports:
      - "8081:8081"
    environment:
      - ENVIRONMENT=development
      # Add other rattle-specific env vars here
    restart: unless-stopped
    # If rattle depends on clank being up:
    # depends_on:
    #   - clank

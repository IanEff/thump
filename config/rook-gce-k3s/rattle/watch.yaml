# rook-gce-k3s's watch list — all six Sloth SLOs (ceph-redundancy is the
# durability SLO, on the replicapool object). Source of record:
# applications/infrastructure/sloth/prometheusservicelevels.yaml.
# Objectives/contractRef
# pulled straight from that file's `objective:` fields. Dependency names
# must match metadata.name entries in config/rook-gce-k3s/whir/
# catalog-info.yaml exactly (whir strips the resource:/component: prefix
# before comparing).
slos:
  - id: ceph-rgw-availability
    object: ceph-rgw
    tier: tier-1
    objective: 0.999
    contractRef: ceph-rgw-availability:v1
    dependencies:
      - name: cephobjectstore
        role: blocking
      - name: rook-operator
        role: blocking

  # Raw-SLI companion to ceph-rgw-availability, added to close the D2 crux
  # gap (phase-e-earn-the-ceiling-guide.md Part 2 D2): the availability SLO
  # only burns on RGW's pre-execution abort_early() rejections, so a
  # backend-slow-under-load dependency_saturation scenario never touches
  # it. This SLO burns on RGW's own GET/PUT AvgTime latency instead — same
  # ceph-rgw component/dependencies, since it's the same subject observed
  # a different way, not a different failure surface.
  - id: ceph-rgw-saturation
    object: ceph-rgw
    tier: tier-1
    objective: 0.99
    contractRef: ceph-rgw-saturation:v1
    dependencies:
      - name: cephobjectstore
        role: blocking
      - name: rook-operator
        role: blocking

  - id: ceph-osd-latency
    object: ceph-osd
    tier: tier-1
    objective: 0.99
    contractRef: ceph-osd-latency:v1
    dependencies:
      - name: cephblockpool
        role: blocking
      - name: ceph-node-1
        role: blocking
      - name: ceph-node-2
        role: blocking
      - name: ceph-node-3
        role: blocking

  - id: ceph-health
    object: ceph-cluster
    tier: tier-1
    objective: 0.999
    contractRef: ceph-health:v1
    dependencies:
      - name: cephcluster
        role: blocking
      - name: rook-operator
        role: blocking

  - id: argocd-sync
    object: argocd
    tier: tier-1
    objective: 0.99
    contractRef: argocd-sync:v1
    dependencies:
      - name: cilium
        role: blocking
      - name: rook-operator
        role: optional

  # Data-durability companion to ceph-health, on a distinct object
  # (replicapool) so its fingerprint dedupes separately: burns when placement
  # groups are degraded or undersized. The redundancy_degraded signal — its
  # sole remedy is the high-blast, reversible accelerate-recovery action, held
  # for a human rather than auto-fired.
  - id: ceph-redundancy
    object: cephblockpool
    tier: tier-1
    objective: 0.999
    contractRef: ceph-redundancy:v1
    dependencies:
      - name: cephcluster
        role: blocking
      - name: rook-operator
        role: blocking

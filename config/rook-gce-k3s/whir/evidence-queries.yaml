# evidence-queries.yaml — read-only PromQL the clank `metrics` tool exposes.
# The model calls metrics with {"q":"<name>"}; the tool runs the mapped query
# and cites the result as an EvidenceRef (Live:true only on a fresh,
# non-empty, non-error result — see internal/clank/metrics_tool.go).
#
# This is the same declared-surface discipline as
# config/rook-gce-k3s/whir/state-queries.yaml and the action catalog
# (clank.go's defaultCatalog): a curated, reviewed set, not arbitrary PromQL
# the model writes itself.
#
# ⚠️ VERIFY EVERY METRIC NAME ON THE TARGET CLUSTER BEFORE TRUSTING THIS.
# Ceph exporter metric names drift across releases and depend on which
# exporters are scraped. Run once against the live cluster:
#   curl -s "$PROM_URL/api/v1/label/__name__/values" | tr ',' '\n' | grep -E 'ceph_|slo:|kube_'
# and reconcile each query below against what's actually there.
version: v1
queries:
  # ── group 1 · cluster health & the firing SLO (universal) ───────────────
  - name: ceph_health              # 0=OK, 1=WARN, 2=ERR — the headline
    query: ceph_health_status
  - name: slo_burn_ceph_health     # the burn rate rattle fired on
    query: slo:current_burn_rate:ratio{sloth_id="ceph-health"}
  - name: slo_burn_rgw             # RGW-availability burn (error-rate SLI — see rgw_failed_rate below)
    query: slo:current_burn_rate:ratio{sloth_id="ceph-rgw-availability"}
  - name: slo_burn_rgw_saturation  # RGW-saturation burn (raw GET/PUT latency SLI — see rgw_get_put_latency_ms below)
    query: slo:current_burn_rate:ratio{sloth_id="ceph-rgw-saturation"}
  - name: slo_burn_osd_latency     # OSD-latency burn — the first live site to render this SLO
    query: slo:current_burn_rate:ratio{sloth_id="ceph-osd-latency"}
  - name: slo_burn_argocd_sync     # ArgoCD-sync burn — no catalog action maps here (D3 decline probe)
    query: slo:current_burn_rate:ratio{sloth_id="argocd-sync"}

  # ── group 2 · OSD / rebalance state (evidence FOR or AGAINST hold-rebalance) ─
  - name: osds_down                # OSDs currently down — transient node loss?
    query: count(ceph_osd_up == 0) or vector(0)
  - name: osds_out                 # OSDs marked out — is CRUSH about to rebalance?
    query: count(ceph_osd_in == 0) or vector(0)
  - name: pgs_degraded             # degraded PGs — the rebalance's blast surface
    query: sum(ceph_pg_degraded) or vector(0)
  - name: pgs_backfilling          # is a rebalance/backfill ALREADY in flight?
    query: sum(ceph_pg_backfilling + ceph_pg_backfill_wait) or vector(0)
  - name: recovery_ops_rate        # recovery ops/s — is the cluster thrashing right now?
    query: sum(ceph_osd_recovery_ops) or vector(0)
  - name: mons_in_quorum           # mon quorum count — a quorum loss changes everything
    query: count(ceph_mon_quorum_status == 1) or vector(0)

  # ── group 3 · capacity / resource_exhaustion (the hold-rebalance failure class) ─
  - name: cluster_used_ratio       # 0..1 whole-cluster fullness
    query: ceph_cluster_total_used_bytes / ceph_cluster_total_bytes
  - name: fullest_pool_ratio       # the single most-full pool — nearfull triggers noout thrash
    query: max(ceph_pool_stored / (ceph_pool_stored + ceph_pool_max_avail))
  - name: osd_write_latency_ms     # avg OSD write latency, filtered to the latency-bridge job
    query: 1000 * rate(ceph_osd_op_w_latency_sum{job="ceph-latency-bridge"}[5m]) / rate(ceph_osd_op_w_latency_count{job="ceph-latency-bridge"}[5m])
    # ⚠️ ceph-latency-bridge's own ladder is already known to have hit an
    # ms-vs-s unit bug on this same rig lineage (ceph-lab-running-notes
    # 2026-07-03, "Bug 1"/"Bug 2") — the Sloth SLO's own errorRatioQuery was
    # corrected to bucket le="102.399999" to work around it. VERIFY this
    # query's `1000 *` is still the right correction before trusting it live
    # — if the sum is already ms, drop it. The job filter matters too:
    # unfiltered ceph_osd_op_w_latency_* triple-counts against
    # rook-ceph-exporter's other scrape paths (same Bug 2).

  # ── group 4 · RGW / traffic (evidence for throttle-non-critical-paths + rgw SLOs) ─
  - name: rgw_request_rate         # req/s through the object gateway
    query: sum(rate(ceph_rgw_req[5m])) or vector(0)
  - name: rgw_failed_rate          # failed req/s — the AVAILABILITY SLI's numerator (pre-execution
    query: sum(rate(ceph_rgw_failed_req[5m])) or vector(0)
    # rejections only — auth/ratelimit/suspended-user. A backend-slow op
    # that completes successfully never moves this; see rgw_get_put_latency_ms.
  - name: rgw_get_put_latency_ms   # avg GET+PUT op latency, ms — the SATURATION SLI's raw value
    query: >-
      1000 * (
        (sum(rate(ceph_rgw_op_get_obj_lat_sum[1m])) + sum(rate(ceph_rgw_op_put_obj_lat_sum[1m])))
        /
        (sum(rate(ceph_rgw_op_get_obj_lat_count[1m])) + sum(rate(ceph_rgw_op_put_obj_lat_count[1m])))
      )
    # Window matched to the ceph-rgw-saturation SLO's own SLI sub-window
    # (prometheusservicelevels.yaml's avg_over_time(... > bool 0.15)[{{.window}}:1m])
    # deliberately, not the usual 5m every other evidence-query here uses.
    # VERIFIED LIVE 2026-07-14 (rgw-network-delay.yaml chaos run, S3 WAL
    # transcript slo_burn:ceph-rgw/1784029108993278359): a 5m rate() window
    # read a diluted "14.48ms, healthy" 40s into a real 4.4s-latency
    # incident — 4.5 minutes of pre-chaos samples still dominated the
    # average, so the model declined on stale evidence while the SLO's own
    # burn rate (1m sub-windows) was already at 40x. 1m still isn't
    # instant (needs ~2 scrape intervals, 60s, to fully reflect a step
    # change) but tracks the SLO's own sensitivity instead of lagging it
    # by 4x.
    # Metric names verified live 2026-07-14 against ceph-gce's real scrape
    # (ceph v19.2.3): ceph_rgw_op_get_obj_lat_sum/_count and the _put_ pair
    # are what's actually exported — the original ceph_rgw_l_get_initial_lat
    # names (transcribed from rgw_perf_counters.cc) don't exist on this
    # cluster. Healthy baseline observed the same session: 14-17ms blended,
    # PUT-only traffic (this rig's s3-traffic-generator does no GETs), 1KB
    # objects. The ceph-rgw-saturation SLO's own threshold is 150ms (~9x
    # baseline) — see prometheusservicelevels.yaml for why the SLI itself
    # is "fraction of the window over the line," not this raw average
    # directly (the raw number here is for the model to cite; the SLO's
    # burn rate is the belief-formation signal).

  # ── group 5 · node / pod state ───────────────────────────────────────────
  # kube-state-metrics is enabled on this rig's prometheus chart
  # (applications/infrastructure/prometheus/values.yaml, kube-state-metrics.
  # enabled: true) — unlike rook-gke, this isn't a maybe.
  - name: nodes_not_ready
    query: count(kube_node_status_condition{condition="Ready",status="true"} == 0) or vector(0)
  - name: rook_pods_not_running
    query: count(kube_pod_status_phase{namespace="rook-ceph",phase!="Running"} == 1) or vector(0)

  # ── group 6 · ArgoCD sync state (evidence for the argocd-sync decline probe) ─
  - name: argocd_apps_out_of_sync
    query: count(argocd_app_info{sync_status!="Synced"}) or vector(0)

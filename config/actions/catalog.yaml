# The authored action catalog (phase C · C3) — the actions clank may
# propose and thump may execute, not a per-site fact (that's why this lives
# at config/actions/, not under a config/<site>/ profile).
#
# contract.LoadCatalogFile binds each Precondition.OK by looking its Name up
# in a compiled contract.PreconditionRegistry — neither contract below
# declares one, so the registry stays empty until an authored contract
# actually needs one.
#
# This file is pinned to contract.Default() by
# TestShippedCatalogMatchesAuthoredDefault (internal/contract/load_test.go).
# If that test goes red after you hand-edit this file, that's the guard
# working — either fix the YAML back or update Default() deliberately.
- name: throttle-non-critical-paths
  applicableFailureClasses:
    - dependency_saturation
  applicableTiers:
    - tier-1
  action:
    description: >-
      Rate-limit anonymous (unauthenticated) RGW requests via
      radosgw-admin's global ratelimit, shedding non-critical load
      without touching authenticated request paths
    scopeParameters:
      throttle_pct:
        min: 10
        max: 60
        default: 25
  blastTier: med
  reversal:
    method: unthrottle
    fallback: page-oncall
  successCriteria:
    metric: latency_p99
    target: "p99 < 250ms"
    # time.Duration has no custom (un)marshaler, so it rides the wire as a
    # plain integer of nanoseconds: 600000000000 == 10 * time.Minute.
    window: 600000000000
    severityQuery: severity_rgw_availability

- name: scale-out-rgw-gateways
  # The second dependency_saturation remedy: adds capacity instead of
  # shedding load, so a proposal for this class is a real trade-off between
  # two candidates for the ranker to weigh, not a rubber stamp on the only
  # option (Phase E's E2).
  applicableFailureClasses:
    - dependency_saturation
  applicableTiers:
    - tier-1
  action:
    description: >-
      Scale up RGW gateway replicas (CephObjectStore spec.gateway.instances)
      to add serving capacity under load
    scopeParameters:
      additional_replicas:
        min: 1
        max: 3
        default: 1
  blastTier: low
  reversal:
    method: scale-in-rgw-gateways
    fallback: page-oncall
  successCriteria:
    metric: rgw_get_put_latency_ms
    target: "avg < 50ms"
    window: 600000000000 # 10 * time.Minute, in nanoseconds

- name: hold-rebalance
  # unknown deliberately NOT listed here — see authored.go's comment on this
  # same contract: mapping "unknown" to an action gave the model an out to
  # act instead of declining.
  applicableFailureClasses:
    - resource_exhaustion
  applicableTiers:
    - tier-1
  action:
    description: >-
      Hold Ceph recovery/rebalancing (osd set noout) while a node is
      transiently out, so the cluster doesn't thrash; reversible.
    scopeParameters:
      hold_minutes:
        min: 5
        max: 60
        default: 15
  blastTier: med
  reversal:
    method: release-rebalance
    fallback: page-oncall
  successCriteria:
    metric: ceph_health
    target: HEALTH_OK
    window: 600000000000 # 10 * time.Minute, in nanoseconds

- name: accelerate-recovery
  # The only high-blast action in the catalog, and the sole remedy for
  # redundancy_degraded: raising recovery concurrency buys durability by
  # spending client-serving I/O — a trade a human blesses, which is why it's
  # authored high. Reversible, so the shaper holds it rather than refusing it.
  applicableFailureClasses:
    - redundancy_degraded
  applicableTiers:
    - tier-1
  action:
    description: >-
      Raise OSD recovery/backfill concurrency (osd_max_backfills,
      osd_recovery_max_active) cluster-wide to restore full data
      replication faster, trading client I/O headroom for durability
      while placement groups are degraded; reversible.
    scopeParameters:
      backfill_concurrency:
        min: 4
        max: 32
        default: 16
  blastTier: high
  reversal:
    method: restore-recovery-defaults
    fallback: page-oncall
  successCriteria:
    metric: pgs_degraded
    target: "pgs_degraded == 0"
    window: 600000000000 # 10 * time.Minute, in nanoseconds

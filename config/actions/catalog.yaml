# The authored action catalog (phase C · C3) — the actions clank may
# propose and thump may execute, not a per-site fact (that's why this lives
# at config/actions/, not under a config/<site>/ profile).
#
# contract.LoadCatalogFile binds each Precondition.OK by looking its Name up
# in a compiled contract.PreconditionRegistry — neither contract below
# declares one, so the registry stays empty until an authored contract
# actually needs one.
#
# This file is pinned to contract.Default() by
# TestShippedCatalogMatchesAuthoredDefault (internal/contract/load_test.go).
# If that test goes red after you hand-edit this file, that's the guard
# working — either fix the YAML back or update Default() deliberately.
- name: hold-rebalance
  # unknown deliberately NOT listed here — see authored.go's comment on this
  # same contract: mapping "unknown" to an action gave the model an out to
  # act instead of declining.
  applicableFailureClasses:
    - redundancy_degraded
  applicableTiers:
    - tier-1
  action:
    description: >-
      Hold Ceph recovery/rebalancing (osd set noout) while a node is
      transiently out, so the cluster doesn't thrash; reversible.
    scopeParameters:
      hold_minutes:
        min: 5
        max: 60
        default: 15
  blastTier: med
  reversal:
    method: release-rebalance
    fallback: page-oncall
  successCriteria:
    metric: ceph_health
    target: HEALTH_OK
    window: 600000000000 # 10 * time.Minute, in nanoseconds
    severityQuery: severity_ceph_redundancy
    severityReductionPct: 0.7

- name: accelerate-recovery
  # The only high-blast action in the catalog, and one of two remedies for
  # redundancy_degraded: raising recovery concurrency buys durability by
  # spending client-serving I/O — a trade a human blesses, which is why it's
  # authored high. Reversible, so the shaper holds it rather than refusing it.
  applicableFailureClasses:
    - redundancy_degraded
  applicableTiers:
    - tier-1
  action:
    description: >-
      Raise OSD recovery/backfill concurrency (osd_max_backfills,
      osd_recovery_max_active) cluster-wide to restore full data
      replication faster, trading client I/O headroom for durability
      while placement groups are degraded; reversible.
    scopeParameters:
      backfill_concurrency:
        min: 4
        max: 32
        default: 16
  blastTier: high
  reversal:
    method: restore-recovery-defaults
    fallback: page-oncall
  successCriteria:
    metric: pgs_degraded
    target: "pgs_degraded == 0"
    window: 600000000000 # 10 * time.Minute, in nanoseconds
    severityQuery: severity_ceph_redundancy
    severityReductionPct: 0.8

# The OTel demo domain's two remedies (Wave 6, thump-test rig CLAUDE.md §8) —
# one per armed flagd flag. Both BlastLow (a single ConfigMap flip) and
# reversible, so both auto-band under hiss's tier-1 act_reversible ceiling.
# Scoped to service_failure only, never a Ceph class — see that class's
# description for why.
- name: disable-product-catalog-failure
  applicableFailureClasses:
    - service_failure
  applicableTiers:
    - tier-1
  action:
    description: >-
      Flip the productCatalogFailure flagd flag to "off" (merge-patch the
      flagd-config ConfigMap in otel-demo), clearing the injected GetProduct
      fault; reversible.
  blastTier: low
  reversal:
    method: enable-product-catalog-failure
    fallback: page-oncall
  successCriteria:
    metric: product_catalog_error_ratio
    target: "product_catalog_error_ratio == 0"
    window: 300000000000 # 5 * time.Minute, in nanoseconds
    severityQuery: severity_product_catalog_availability
    severityReductionPct: 0.9

- name: disable-cart-failure
  # cart is the ranker's two-eligible-action case (Wave 7): cartFailure is
  # also "fixable" by restarting the cart pod, but the fault is flag state,
  # not pod state, so only this action actually clears it.
  applicableFailureClasses:
    - service_failure
  applicableTiers:
    - tier-1
  action:
    description: >-
      Flip the cartFailure flagd flag to "off" (merge-patch the flagd-config
      ConfigMap in otel-demo), clearing the injected EmptyCart RPC fault
      (checkout -> CartService gRPC status 9); reversible.
  blastTier: low
  reversal:
    method: enable-cart-failure
    fallback: page-oncall
  successCriteria:
    metric: cart_error_ratio
    target: "cart_error_ratio == 0"
    window: 300000000000 # 5 * time.Minute, in nanoseconds
    severityQuery: severity_cart_availability
    severityReductionPct: 0.9

- name: restart-cart-pod
  # cart's plausible-but-wrong alternative (Wave 7's ranker exercise): real,
  # BlastLow, reversible — clears the gate on its own merits. What
  # discriminates it from disable-cart-failure is the honest
  # severityReductionPct below: cartFailure is flagd-controlled flag state,
  # not pod state, so recycling cart's pods doesn't touch the fault.
  applicableFailureClasses:
    - service_failure
  applicableTiers:
    - tier-1
  action:
    description: >-
      Roll the cart Deployment's pods (merge-patch a pod-template restart
      annotation, the same mechanism `kubectl rollout restart` uses);
      reversible in the sense that repeating it is harmless, but it does not
      clear a flagd-controlled fault.
  blastTier: low
  reversal:
    method: restart-cart-pod
    fallback: page-oncall
  successCriteria:
    metric: cart_error_ratio
    target: "cart_error_ratio == 0"
    window: 300000000000 # 5 * time.Minute, in nanoseconds
    severityQuery: severity_cart_availability
    severityReductionPct: 0.1

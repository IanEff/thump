# The authored failure-class definitions — rig-invariant knowledge every
# site shares (unlike evidence-queries.yaml's query names, which vary by
# site — ceph-lab/rook-gke/rook-gce-k3s can each name their evidence
# differently). clank's seedPrompt renders this list so the model is told
# what a class means instead of inferring it from which action happens to
# be catalogued for it.
#
# This file is pinned to contract.DefaultFailureClasses() by
# TestShippedFailureClassesMatchesAuthoredDefault
# (internal/contract/load_test.go). If that test goes red after you
# hand-edit this file, that's the guard working — either fix the YAML back
# or update DefaultFailureClasses() deliberately.
- class: dependency_saturation
  description: >-
    an upstream/downstream dependency is overloaded for every caller — the
    resource itself is unhealthy, not this one service's connection to it;
    cite request-rate/failure-rate or upstream latency evidence, not just
    elevated latency on the resource. A single caller failing to reach an
    otherwise-healthy dependency because of its OWN injected fault or bad
    config is service_failure, not this.
- class: resource_exhaustion
  description: >-
    the resource ITSELF is out of headroom — cite capacity evidence (e.g.
    utilization/fullness). Ongoing recovery/backfill activity with healthy
    capacity is NOT resource_exhaustion.
- class: redundancy_degraded
  description: >-
    the cluster is running below its configured replication — placement
    groups are degraded or undersized, so stored data is at elevated loss
    risk until recovery restores the full replica count. Cite
    degraded/undersized PG evidence, not capacity fullness
    (resource_exhaustion) or request/failure rate (dependency_saturation).
- class: traffic_shift
  description: a legitimate change in load pattern, not a failure.
- class: service_failure
  description: >-
    a service is returning errors on its own request or RPC path, or failing to reach a
    dependency it needs, because of an injected fault or bad config IN THAT SERVICE — not
    because the dependency is degraded for every caller (dependency_saturation) or a resource
    is out of headroom (resource_exhaustion). Cite the service's own error-rate evidence; the
    fix is disabling the fault, not scaling or waiting.
- class: unknown
  description: >-
    the evidence doesn't clearly support any of the above — call
    insufficient rather than forcing a label just because an action exists
    for it.

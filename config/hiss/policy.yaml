# hiss refuses to start without this file (hiss.go:83-85, HISS_POLICY env
# var). Schema is hiss.Policy's YAML tags (policy.go:18) — field values here
# match the calmPolicy() fixture in internal/hiss/authority_test.go so the
# live run exercises the same posture the seam tests already prove out.
version: v1
floors:
  tier-1:
    dependency_saturation: 0.75
    resource_exhaustion: 0.75 # parity value with dependency_saturation, fixture-derived —
    # not yet calibrated against agent_proposal_confidence/agent_proposal_success_total.
    # That's not a TODO, it's a structural wait: agent_proposal_success_total only
    # populates on ResultSuccess/ResultFailure (metrics.go recordCalibration), and thump
    # v1 is dry-run-only — DryRun.Execute (internal/thump/executor.go) always reports
    # ResultRendered. Confirmed empty on a real approved+executed run, 2026-07-13 (see
    # thump-running-notes.md). Revisit once thump grows a live executor.
    redundancy_degraded: 0.75 # parity value, fixture-derived — same calibration wait as resource_exhaustion above.
maxBand:
  tier-1: act_reversible
autoBand:
  tier-1: act_reversible
requireReversal: true

# Static topology map for rattle's TopologySource (internal/whir).
# Ceph section carried verbatim from config/rook-gce-k3s/whir/catalog-info.yaml
# (same manifest family — cephobjectstore/cephblockpool/cephcluster CR names
# verified live against this cluster 2026-07-19: ceph-objectstore,
# replicapool, rook-ceph). OTel demo section is new (Wave 6), additive per
# CLAUDE.md §8: two orthogonal domains, one topology file, no shared edges
# between them.
#
# dependsOn edges wired 1:1 to every Sloth SLO's dependency shape
# (rattle/watch.yaml):
#   ceph-rgw-availability/-saturation -> ceph-rgw component
#   ceph-osd-latency                   -> ceph-osd component
#   ceph-health                        -> ceph-cluster component
#   argocd-sync                        -> argocd component
#   ceph-redundancy                    -> cephblockpool resource
#   product-catalog-availability       -> product-catalog component
#   cart-availability                  -> cart component

# --- Ceph domain: application components ---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ceph-rgw
  description: RGW — S3-compatible object gateway. Subject of the ceph-rgw-availability and ceph-rgw-saturation SLOs.
spec:
  type: service
  lifecycle: experimental
  owner: ceph-lab
  dependsOn:
    - resource:default/cephobjectstore
    - component:default/rook-operator
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ceph-osd
  description: OSD read/write path. Subject of the ceph-osd-latency SLO.
spec:
  type: service
  lifecycle: experimental
  owner: ceph-lab
  dependsOn:
    - resource:default/cephblockpool
    - resource:default/ceph-node-1
    - resource:default/ceph-node-2
    - resource:default/ceph-node-3
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: ceph-cluster
  description: Overall Ceph cluster health. Subject of the ceph-health SLO.
spec:
  type: service
  lifecycle: experimental
  owner: ceph-lab
  dependsOn:
    - resource:default/cephcluster
    - component:default/rook-operator
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: argocd
  description: GitOps continuous delivery — syncs all cluster state from git. Subject of the argocd-sync SLO.
spec:
  type: service
  lifecycle: experimental
  owner: ceph-lab
  dependsOn:
    - component:default/cilium
    - component:default/rook-operator
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: rook-operator
  description: Rook operator — manages the CephCluster lifecycle.
spec:
  type: service
  lifecycle: experimental
  owner: ceph-lab
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: cilium
  description: CNI, L2 load-balancing, and Gateway API implementation for the cluster.
spec:
  type: service
  lifecycle: experimental
  owner: ceph-lab

# --- Ceph domain: storage resources ---
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: cephcluster
  description: The CephCluster CR — the whole Ceph deployment.
spec:
  type: ceph-storage
  owner: ceph-lab
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: cephblockpool
  description: replicapool — the RBD block pool backing rook-ceph-block (cluster-default StorageClass).
spec:
  type: ceph-storage
  owner: ceph-lab
  dependsOn:
    - resource:default/cephcluster
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: cephfilesystem
  description: CephFS filesystem (requires the CephFilesystemSubVolumeGroup, gotcha #4).
spec:
  type: ceph-storage
  owner: ceph-lab
  dependsOn:
    - resource:default/cephcluster
---
apiVersion: backstage.io/v1alpha1
kind: Resource
metadata:
  name: cephobjectstore
  description: RGW object store backing the ceph-rgw component.
spec:
  type: ceph-storage
  owner: ceph-lab
  dependsOn:
    - resource:default/cephcluster


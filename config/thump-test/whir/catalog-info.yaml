# --- OTel demo domain (Wave 6, new): call-graph components ---
# Only the services referenced by an SLO (as object or dependency) are
# entered — frontend -> product-catalog / cart / checkout, checkout -> cart,
# per CLAUDE.md §8. flagd is the shared fault control plane for both armed
# flags, a dependency of both demo SLOs, no dependents.
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: frontend
  description: Demo storefront — emits app_frontend_requests_total, the product-catalog-availability SLI.
spec:
  type: service
  lifecycle: experimental
  owner: otel-demo
  dependsOn:
    - component:default/product-catalog
    - component:default/cart
    - component:default/checkout
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: checkout
  description: Checkout service — gRPC client to CartService; emits rpc_client_duration_milliseconds, the cart-availability SLI.
spec:
  type: service
  lifecycle: experimental
  owner: otel-demo
  dependsOn:
    - component:default/cart
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: product-catalog
  description: Product catalog service. Subject of the product-catalog-availability SLO (productCatalogFailure flagd fault).
spec:
  type: service
  lifecycle: experimental
  owner: otel-demo
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: cart
  description: Cart service. Subject of the cart-availability SLO (cartFailure flagd fault, EmptyCart RPC).
spec:
  type: service
  lifecycle: experimental
  owner: otel-demo
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: flagd
  description: Feature-flag service — the control plane for both armed demo faults (productCatalogFailure, cartFailure). A disable-<flag>-failure action merge-patches its flagd-config ConfigMap.
spec:
  type: service
  lifecycle: experimental
  owner: otel-demo

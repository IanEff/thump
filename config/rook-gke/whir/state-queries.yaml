# Per-dependency "is it healthy right now" queries for whir's Resolver
# (internal/whir, Stage 3). `dependency` must be the BARE name — whir strips
# the `resource:default/`/`component:default/` prefix off dependsOn refs when
# it parses catalog-info.yaml (internal/whir/whir.go), so Catalog.Edges()
# hands back names like "cephobjectstore", not "resource:default/cephobjectstore".
# Each query is an instant PromQL whose result means: value > 0 => healthy,
# value = 0 => degraded, no result / error => unknown (a state, not an error).
#
# Node/disk queries are intentionally NOT node-filtered (all three GKE nodes
# share the same query) — real node names, swapped in from the Stage 4 tail
# (phase2-converge-rook-gke-guide.md).
version: v1
queries:
  - dependency: rook-operator
    query: 'up{job="rook-ceph-operator"} == 1'
  - dependency: cephobjectstore
    query: 'up{job="rook-ceph-mgr"} == 1'
  - dependency: cephblockpool
    query: 'ceph_pool_stored > 0'
  - dependency: cephcluster
    query: 'ceph_health_status == 0'
  - dependency: gke-rook-ceph-gke-rook-ceph-gke-node--1abe8375-mwcx
    query: 'kube_node_status_condition{condition="Ready",status="true"} == 1'
  - dependency: gke-rook-ceph-gke-rook-ceph-gke-node--400af229-b9qp
    query: 'kube_node_status_condition{condition="Ready",status="true"} == 1'
  - dependency: gke-rook-ceph-gke-rook-ceph-gke-node--c237685c-6h1k
    query: 'kube_node_status_condition{condition="Ready",status="true"} == 1'
  - dependency: gke-rook-ceph-gke-rook-ceph-gke-node--1abe8375-mwcx-disk
    query: 'kubelet_volume_stats_capacity_bytes > 0'
  - dependency: gke-rook-ceph-gke-rook-ceph-gke-node--400af229-b9qp-disk
    query: 'kubelet_volume_stats_capacity_bytes > 0'
  - dependency: gke-rook-ceph-gke-rook-ceph-gke-node--c237685c-6h1k-disk
    query: 'kubelet_volume_stats_capacity_bytes > 0'
